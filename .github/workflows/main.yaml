name: push
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: set node version
        uses: actions/setup-node@v2
        with:
          node-version: 20
          cache: 'pnpm'
        
      - name: Install dependencies
        run: pnpm install
      - name: Test
        run: pnpm test